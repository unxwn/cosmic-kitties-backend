databaseChangeLog:
  - changeSet:
      id: 004-create-orders-products
      author: Myroslav Polishchuk
      changes:
        - createTable:
            tableName: orders_products
            columns:
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: orders_products
            columnNames: order_id, product_id
            constraintName: pk_orders_products

        - addForeignKeyConstraint:
            baseTableName: orders_products
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_orders_products_order_id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: orders_products
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_orders_products_product_id
            onDelete: CASCADE

