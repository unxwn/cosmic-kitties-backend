databaseChangeLog:
  - changeSet:
      id: 003-create-customers-and-orders-fk
      author: Myroslav Polishchuk
      changes:
        - createSequence:
            sequenceName: customers_id_seq
            dataType: bigint
            incrementBy: 1
            startValue: 1

        - createTable:
            tableName: customers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  defaultValueComputed: nextval('customers_id_seq')
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
              - column:
                  name: last_name
                  type: VARCHAR(100)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: customers
            columnNames: email
            constraintName: uq_customers_email

        - addColumn:
            tableName: orders
            columns:
              - column:
                  name: customer_id
                  type: BIGINT
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: customer_id
            referencedTableName: customers
            referencedColumnNames: id
            constraintName: fk_orders_customer_id
            onDelete: SET NULL

